// ── Socket.io bağlantısı ──────────────────────────────────
// ⚠️  PRODUCTION'A GEÇMEDEN ÖNCE BU SATIRI GÜNCELLE:
// const SOCKET_URL = 'https://lokmanonsoy.com:3000';
const SOCKET_URL = 'http://localhost:3000';
let socket = null;
let socketConnected = false;

// Yerel yedek havuz (sunucu yoksa çalışmaya devam eder)
const localPool = [];
let totalSubmitted = 0;
let userCount = 0;

function updatePoolStat() {
  const poolSize = socketConnected
    ? parseInt(poolStatEl.dataset.poolSize || 0)
    : localPool.length;
  poolStatEl.textContent = `havuz: ${totalSubmitted}  ·  aktif: ${poolSize}  ·  kullanıcı: ${userCount}`;
}

function initSocket() {
  try {
    socket = io(SOCKET_URL, { timeout: 3000, reconnectionAttempts: 5 });

    socket.on('connect', () => {
      socketConnected = true;
      console.log('Sunucuya bağlandı');
    });

    socket.on('disconnect', () => {
      socketConnected = false;
      updatePoolStat();
    });

    // Havuz güncellemesi geldi
    socket.on('pool:update', ({ pool, totalSubmitted: ts, totalPopped }) => {
      totalSubmitted = ts;
      poolStatEl.dataset.poolSize = pool.length;
      updatePoolStat();
    });

    socket.on('pool:sync', ({ pool, totalSubmitted: ts, userCount: uc }) => {
      totalSubmitted = ts;
      userCount = uc;
      poolStatEl.dataset.poolSize = pool.length;
      updatePoolStat();
    });

    socket.on('users:update', (n) => {
      userCount = n;
      updatePoolStat();
    });

    socket.on('connect_error', () => {
      socketConnected = false;
    });

  } catch(e) {
    console.warn('Socket.io yüklenemedi, yerel mod aktif');
  }
}
initSocket();

function submitWord() {
  const raw = inputEl.value.trim();
  if (!raw) return;
  inputEl.value = '';
  totalSubmitted++;

  if (socketConnected && socket) {
    socket.emit('word:submit', raw);
  } else {
    // Sunucu yoksa yerel havuza ekle
    localPool.push({ text: raw });
    updatePoolStat();
  }
  appendBottom('+ ' + raw);
  inputEl.focus();
}

// Enter tuşu
inputEl.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); submitWord(); } });
canvas.addEventListener('mousedown', e => { if(document.activeElement===inputEl) e.preventDefault(); });

// Çarpışmada havuzdan kelime al
function spawnFromPool(x, y) {
  if (socketConnected && socket) {
    // Sunucudan kelime iste (callback ile)
    socket.emit('pool:pop', (word) => {
      if (!word) return;
      const p = new Particle(x, y, 'word', word.text, null);
      p.collisionCooldown = 80;
      p.userSubmitted = true;
      spawnQueue.push(p);
      appendBottom(word.text);
    });
  } else {
    // Yerel havuzdan al
    if (localPool.length === 0) return;
    const idx = Math.floor(Math.random() * localPool.length);
    const word = localPool.splice(idx, 1)[0];
    const p = new Particle(x, y, 'word', word.text, null);
    p.collisionCooldown = 80;
    p.userSubmitted = true;
    spawnQueue.push(p);
    appendBottom(word.text);
    updatePoolStat();
  }
}

function appendBottom(text) {
  let last=wlines[2]?wlines[2]+'  '+text:text;

const ALL_LANGS = Object.keys(WORD_POOL);
const ALL_ALPHA = Object.values(ALPHABET_POOLS).flat();

function randomLetter() {
  // Ağırlıklı olarak latin, ama diğerleri de var
  const pool = Math.random()<0.45 ? ALPHABET_POOLS.latin :
               Math.random()<0.5  ? ALPHABET_POOLS.cyril :
               Math.random()<0.4  ? ALPHABET_POOLS.arabic :
               Math.random()<0.5  ? ALPHABET_POOLS.japanese :
               Math.random()<0.5  ? ALPHABET_POOLS.cjk :
               Math.random()<0.4  ? ALPHABET_POOLS.greek :
               ALL_ALPHA;
  return pool[Math.floor(Math.random()*pool.length)];
}

function randomWord() {
  const lang = ALL_LANGS[Math.floor(Math.random()*ALL_LANGS.length)];
  const pool = WORD_POOL[lang];
  return { text: pool[Math.floor(Math.random()*pool.length)], lang };
}

function randomWordFromLang(lang) {
  const pool = WORD_POOL[lang] || WORD_POOL.en;
  return pool[Math.floor(Math.random()*pool.length)];
}

// ── Renk per dil ─────────────────────────────────────────
const LANG_HUE = { tr:25, en:210, fr:260, de:180, es:45, ru:0, ja:320, ar:140, it:35, pt:90, ko:195, zh:15, hi:55, pl:230, fa:150, el:200, he:75, jp2:310, la:280 };
function langColor(lang, alpha, hueShift=0) {
  const h = ((LANG_HUE[lang] ?? 200) + hueShift * 18) % 360;
  const s = Math.min(90, 55 + hueShift * 4);
  const l = Math.max(15, 30 - hueShift * 1.5);
  return `hsla(${h},${s}%,${l}%,${alpha})`;
}

// ── Ölüm izleri ──────────────────────────────────────────
const ghosts = []; // { x, y, angle, content, lang, fs, hueShift, opacity }

// ── Spatial Hash ──────────────────────────────────────────
class SpatialHash {
  constructor(cs){this.cs=cs;this.cells=new Map();}
  clear(){this.cells.clear();}
  key(cx,cy){return(cx&0xffff)|((cy&0xffff)<<16);}
  insert(p){const cx=Math.floor(p.x/this.cs),cy=Math.floor(p.y/this.cs);const k=this.key(cx,cy);if(!this.cells.has(k))this.cells.set(k,[]);this.cells.get(k).push(p);}
  query(x,y,r){const res=[];const cx0=Math.floor((x-r)/this.cs),cx1=Math.floor((x+r)/this.cs),cy0=Math.floor((y-r)/this.cs),cy1=Math.floor((y+r)/this.cs);for(let cy=cy0;cy<=cy1;cy++)for(let cx=cx0;cx<=cx1;cx++){const b=this.cells.get(this.key(cx,cy));if(b)for(const p of b)res.push(p);}return res;}
}

// ── Parçacık ─────────────────────────────────────────────
// type: 'letter' | 'word'
// Harfler çarpışınca kelime olur, kelimeler çarpışınca başka dildeki kelimeye dönüşür
const MAX_P=800;
const particles=[], spawnQueue=[];

class Particle {
  constructor(x,y,type,content,lang){
    this.x = x ?? RADIUS+Math.random()*(W-DIAMETER);
    this.y = y ?? RADIUS+Math.random()*(H-DIAMETER);
    this.vx=(Math.random()-0.5)*1.2; this.vy=(Math.random()-0.5)*1.2;
    this.type  = type    ?? 'letter'; // 'letter' | 'word'
    this.content = content ?? randomLetter();
    this.lang  = lang ?? null;

    // Görsel
    this.fs    = type==='word' ? 11+Math.random()*6 : 9+Math.random()*4;
    this.angle = (Math.random()-0.5)*0.3;
    this.angleV= (Math.random()-0.5)*0.006;
    this.opacity=0;
    this.dead=false; this.dying=false;

    // Hue evrimi — her dönüşümde hue kayar
    this.hueShift = 0; // kaç kez dönüşüm geçirdi

    // Void seeking
    this.tx=this.x; this.ty=this.y;
    this.retarget=Math.floor(Math.random()*80);
    this.retargetEvery=50+Math.floor(Math.random()*120);
    this.pull=0.022+Math.random()*0.015;
    this.phase=Math.random()*Math.PI*2;

    // Çarpışma
    this.collisions=0;
    this.collidedWith=new Set();
    this.collisionCooldown=type==='word'?60:0;

    // Dönüşüm animasyonu
    this.transforming=false;
    this.transformTimer=0;

    // Trail
    this.trail=[];
  }

  retargetVoid(){
    if(++this.retarget<this.retargetEvery)return;
    this.retarget=0; this.retargetEvery=50+Math.floor(Math.random()*120);
    this.tx=RADIUS+Math.random()*(W-DIAMETER);
    this.ty=RADIUS+Math.random()*(H-DIAMETER);
  }

  update(frame,hash){
    if(this.dead)return;
    if(this.dying){
      this.opacity-=0.05;
      if(this.opacity<=0){
        // Kelime ölünce iz bırak
        if(this.type==='word'){
          ghosts.push({
            x:this.x, y:this.y, angle:this.angle,
            content:this.content, lang:this.lang,
            fs:this.fs, hueShift:this.hueShift, opacity:0.20
          });
        }
        this.dead=true;
      }
      else{this.vx*=0.8;this.vy*=0.8;this.x+=this.vx;this.y+=this.vy;}
      return;
    }

    this.opacity=Math.min(1,this.opacity+0.04);
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.retargetVoid();

    const dx=this.tx-this.x,dy=this.ty-this.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){this.vx+=(dx/dist)*this.pull;this.vy+=(dy/dist)*this.pull;}

    this.vx+=Math.sin(frame*0.018+this.phase)*0.004;
    this.vy+=Math.cos(frame*0.014+this.phase*1.2)*0.004;

    // Fare
    const mdx=this.x-mouse.x,mdy=this.y-mouse.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
    const mr=mouse.down?110:60;
    if(md<mr&&md>0.1){const str=(1-md/mr)*(mouse.down?4:1.5);this.vx+=(mdx/md)*str;this.vy+=(mdy/md)*str;}

    // Çarpışma
    this.collidedWith.clear();
    if(this.collisionCooldown>0)this.collisionCooldown--;

    const R=this.type==='word'?this.fs*this.content.length*0.32:RADIUS;
    const neighbors=hash.query(this.x,this.y,R*2+4);
    for(const o of neighbors){
      if(o===this||o.dead||o.dying)continue;
      const oR=o.type==='word'?o.fs*o.content.length*0.32:RADIUS;
      const minD=R+oR;
      const ex=this.x-o.x,ey=this.y-o.y,d2=ex*ex+ey*ey;
      if(d2<minD*minD&&d2>0.01){
        const d=Math.sqrt(d2),ov=minD-d,nx=ex/d,ny=ey/d,ps=ov*0.4;
        this.vx+=nx*ps*0.35;this.vy+=ny*ps*0.35;
        o.vx-=nx*ps*0.35;o.vy-=ny*ps*0.35;

        if(this.collisionCooldown===0&&o.collisionCooldown===0&&
           !this.collidedWith.has(o)&&!o.collidedWith.has(this)){
          this.collidedWith.add(o);

          if(this.type==='letter'&&o.type==='letter'){
            if(particles.length+spawnQueue.length<MAX_P){
              const w=randomWord();
              const baby=new Particle((this.x+o.x)/2,(this.y+o.y)/2,'word',w.text,w.lang);
              baby.collisionCooldown=80;
              spawnQueue.push(baby);
              statWords++;
              appendBottom(w.text);
            }
            spawnFromPool((this.x+o.x)/2,(this.y+o.y)/2);
            this.dying=true; o.dying=true;
            statLetters--;

          } else if(this.type==='word'&&o.type==='word'){
            const newLang=ALL_LANGS[Math.floor(Math.random()*ALL_LANGS.length)];
            const newText=randomWordFromLang(newLang);
            if(particles.length+spawnQueue.length<MAX_P){
              const baby=new Particle((this.x+o.x)/2,(this.y+o.y)/2,'word',newText,newLang);
              baby.collisionCooldown=80;
              baby.hueShift = Math.max(this.hueShift, o.hueShift) + 1;
              spawnQueue.push(baby);
              statTrans++;
              appendBottom(newText);
            }
            spawnFromPool((this.x+o.x)/2,(this.y+o.y)/2);
            this.dying=true; o.dying=true;

          } else if(this.type==='word'&&o.type==='letter'){
            const newLang=ALL_LANGS[Math.floor(Math.random()*ALL_LANGS.length)];
            this.content=randomWordFromLang(newLang);
            this.lang=newLang;
            this.collisionCooldown=60;
            this.fs=11+Math.random()*5;
            this.hueShift++;
            statTrans++;
            spawnFromPool((this.x+o.x)/2,(this.y+o.y)/2);
            o.dying=true;

          } else if(this.type==='letter'&&o.type==='word'){
            const newLang=ALL_LANGS[Math.floor(Math.random()*ALL_LANGS.length)];
            o.content=randomWordFromLang(newLang);
            o.lang=newLang;
            o.collisionCooldown=60;
            o.fs=11+Math.random()*5;
            o.hueShift++;
            statTrans++;
            spawnFromPool((this.x+o.x)/2,(this.y+o.y)/2);
            this.dying=true;
          }
        }
      }
    }

    if(this.dying)return;

    this.angle+=this.angleV;
    this.vx*=0.88;this.vy*=0.88;
    const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    const ms=this.type==='word'?0.9:1.3;
    if(spd>ms){this.vx=(this.vx/spd)*ms;this.vy=(this.vy/spd)*ms;}
    this.x+=this.vx;this.y+=this.vy;

    if(this.x<RADIUS){this.x=RADIUS;this.vx=Math.abs(this.vx)*0.3;}
    if(this.x>W-RADIUS){this.x=W-RADIUS;this.vx=-Math.abs(this.vx)*0.3;}
    if(this.y<RADIUS){this.y=RADIUS;this.vy=Math.abs(this.vy)*0.3;}
    if(this.y>H-RADIUS){this.y=H-RADIUS;this.vy=-Math.abs(this.vy)*0.3;}
  }

  draw(){
    if(this.dead)return;
    const a=this.opacity;

    // Trail
    if(this.trail.length>1&&this.type==='word'){
      for(let i=1;i<this.trail.length;i++){
        const t=i/this.trail.length;
        ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);ctx.lineTo(this.trail[i].x,this.trail[i].y);
        const col=this.lang?langColor(this.lang,t*a*0.15):`rgba(40,35,30,${t*a*0.12})`;
        ctx.strokeStyle=col;ctx.lineWidth=0.5+t*0.8;ctx.stroke();
      }
    }

    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.textAlign='center';ctx.textBaseline='middle';

    if(this.type==='letter'){
      ctx.font=`${this.fs}px 'Georgia',serif`;
      ctx.fillStyle=`rgba(40,35,28,${a*0.75})`;
      ctx.fillText(this.content,0,0);
    } else {
      ctx.font=`${this.fs}px 'Georgia',serif`;
      const col=this.lang?langColor(this.lang,a,this.hueShift)
               :this.userSubmitted?`rgba(20,15,10,${a})`:`rgba(30,25,20,${a})`;
      ctx.fillStyle=col;
      ctx.fillText(this.content,0,0);
      // Kullanıcı kelimesi — altı çizgi
      if(this.userSubmitted&&!this.lang){
        const tw=ctx.measureText(this.content).width;
        ctx.beginPath();ctx.moveTo(-tw/2,this.fs*0.65);ctx.lineTo(tw/2,this.fs*0.65);
        ctx.strokeStyle=`rgba(20,15,10,${a*0.4})`;ctx.lineWidth=0.5;ctx.stroke();
      }
      if(this.lang){
        ctx.font=`6px 'Courier New',monospace`;
        ctx.fillStyle=langColor(this.lang,a*0.4,this.hueShift);
        ctx.fillText(this.lang.toUpperCase(),0,this.fs*0.85);
      }
    }
    ctx.restore();
  }
}

// ── Başlangıç ─────────────────────────────────────────────
const RADIUS=6,DIAMETER=12;
const N=Math.max(8,Math.min(400,Math.floor(W*H*0.00016)));
for(let i=0;i<N;i++){
  particles.push(new Particle());
  statLetters++;
}

const hash=new SpatialHash(40);
let frame=0;

// Zaman zaman yeni harf doğur — sistem canlı kalsın
function maybeSpawn(){
  const letters=particles.filter(p=>!p.dead&&p.type==='letter').length;
  const words=particles.filter(p=>!p.dead&&p.type==='word').length;
  if(particles.length+spawnQueue.length<MAX_P&&letters<80){
    spawnQueue.push(new Particle());
    statLetters++;
  }
}

function loop(){
  requestAnimationFrame(loop);
  frame++;

  ctx.fillStyle='#f2efe9';
  ctx.fillRect(0,0,W,H);

  for(let i=particles.length-1;i>=0;i--)if(particles[i].dead)particles.splice(i,1);
  for(const p of spawnQueue)particles.push(p);
  spawnQueue.length=0;

  if(frame%45===0)maybeSpawn();

  hash.clear();
  for(const p of particles)if(!p.dead)hash.insert(p);
  for(const p of particles)p.update(frame,hash);

  // Ölüm izleri — %20 opaklıkta kalıcı
  for(const g of ghosts){
    ctx.save();
    ctx.translate(g.x,g.y); ctx.rotate(g.angle);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`${g.fs}px 'Georgia',serif`;
    ctx.fillStyle=g.lang?langColor(g.lang,g.opacity,g.hueShift):`rgba(30,25,20,${g.opacity})`;
    ctx.fillText(g.content,0,0);
    ctx.restore();
  }

  for(const p of particles)p.draw();

  if(frame%20===0){
    // istatistik paneli kaldırıldı
  }

  const cr=mouse.down?110:60;
  ctx.beginPath();ctx.arc(mouse.x,mouse.y,cr,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.8;ctx.stroke();
  ctx.beginPath();ctx.arc(mouse.x,mouse.y,2,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();
}

loop();
</script>
